services:
  db:
    image: postgres:15-alpine
    container_name: testbarn-db
    environment:
      POSTGRES_DB: testbarn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d testbarn"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate:v4.17.1
    container_name: testbarn-migrate
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://postgres:postgres@db:5432/testbarn?sslmode=disable",
        "up"
      ]
    volumes:
      - ./db/migrations:/migrations:ro
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      target: runtime
    container_name: testbarn-backend
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/testbarn?sslmode=disable
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8080:8080"

volumes:
  postgres_data:
