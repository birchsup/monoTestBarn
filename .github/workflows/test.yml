name: Frontend unit tests

# Runs the Vitest validation suite on every push and pull request.
# The status of this job is what shows up as the green/red check on a PR.
on:
  push:
  pull_request:

jobs:
  vitest:
    name: Vitest (validation)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit:run
